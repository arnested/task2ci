---
# Hand-written, NOT generated by task2ci.
# Lives in .github/workflows/ because that's the only directory GitHub Actions
# scans. task2ci only writes files for which a matching template exists under
# .task2ci/workflows/, so this file is left alone by `task2ci` runs.
#
# Purpose: when Dependabot opens a PR bumping an action version in one of our
# templates, regenerate the workflows on the PR branch so `-check` passes.
# Without this, every Dependabot PR would land red until a human pulls,
# regenerates locally, and pushes.

name: Regenerate workflows for Dependabot
on:
  pull_request:

permissions:
  contents: write

jobs:
  regen:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          # Use a token that can push; default GITHUB_TOKEN works for
          # same-repo Dependabot PRs given the workflow-level write perm.
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Regenerate workflows
        run: go tool task2ci
      - name: Commit and push if anything changed
        run: |
          if git diff --quiet; then
            echo "No regeneration needed."
            exit 0
          fi
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows
          git commit -m "Regenerate workflows for Dependabot bump"
          git push
