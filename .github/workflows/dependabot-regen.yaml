---
# Hand-written, NOT generated by task2ci.
# Lives in .github/workflows/ because that's the only directory GitHub Actions
# scans. task2ci only writes files for which a matching template exists under
# .task2ci/workflows/, so this file is left alone by `task2ci` runs.
#
# Purpose: when Dependabot opens a PR bumping an action version in one of our
# templates, regenerate the workflows on the PR branch so `-check` passes.
#
# Requires a repo secret `WORKFLOWS_PAT` — a fine-grained PAT scoped to this
# repo with:
#   - Contents: Read and write
#   - Workflows: Read and write
#
# GITHUB_TOKEN can't push files under .github/workflows/ regardless of the
# `permissions:` block, so a PAT is the only viable path.

name: Regenerate workflows for Dependabot
on:
  pull_request:

jobs:
  regen:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-24.04
    steps:
      - name: Verify WORKFLOWS_PAT is set
        env:
          PAT: ${{ secrets.WORKFLOWS_PAT }}
        run: |
          if [ -z "$PAT" ]; then
            echo "::error::WORKFLOWS_PAT secret is not set."
            echo "Create a fine-grained PAT with Contents: Read+Write and"
            echo "Workflows: Read+Write scoped to this repo, then add it as"
            echo "a repository secret named WORKFLOWS_PAT."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.WORKFLOWS_PAT }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Regenerate workflows
        run: go tool task2ci

      - name: Commit and push if anything changed
        run: |
          if git diff --quiet; then
            echo "No regeneration needed."
            exit 0
          fi
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows
          git commit -m "Regenerate workflows for Dependabot bump"
          git push
