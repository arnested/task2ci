---
name: ci

on:
  - push
  - pull_request

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Check generated CI is up to date
        run: go tool task2ci -check
      # @ci: build

  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Check generated CI is up to date
        run: go tool task2ci -check
      # @ci: test
